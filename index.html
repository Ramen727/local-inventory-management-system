<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <title>TCPHUA Inventory System</title>
</head>
<body>
    <header>
        <h1>TCPHUA Inventory</h1>
    </header>
    
    <div class="actions">
        <button type="button" id="btn-add-stock">Add Stock</button>
        <button type="button" id="btn-deduct-stock">Deduct Stock</button>
    
        <button type="button" id="btn-new-item" class="btn-primary">Add New Item</button>
        <button type="button" id="btn-remove-item" class="btn-danger">Remove Item</button>
    
        <label for="search" style="margin-left: auto;">Search:</label>
        <input type="text" id="search" name="search" placeholder="Search parts...">
    </div>
    
    <main>
        <table>
            <thead>
                <tr>
                    <th></th> 
                    <th>Part No.</th>
                    <th>Part Ref No.</th>
                    <th>Description</th>
                    <th>Quantity</th>
                    <th>Price</th>
                    <th>Remark</th>
                </tr>
            </thead>
            <tbody id="inventory-body">
                </tbody>
        </table>
    </main>

    <script src="./renderer.js"></script>
</body>
</html>
