<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <title>Add New Part</title>
</head>
<body>
    <header class="modal-header">
        <h1>Add New Inventory Item</h1>
    </header>
    
    <main style="padding: 20px;">
        <form id="add-form">
            <div class="input-group">
                <label for="part-no">Part No.</label>
                <input type="text" id="part-no" required>
            </div>
            
            <div class="input-group">
                <label for="part-ref-no">Part Ref No.</label>
                <input type="text" id="part-ref-no">
            </div>
            
            <div class="input-group">
                <label for="description">Description</label>
                <input type="text" id="description" required>
            </div>
            
            <div class="input-group">
                <label for="quantity">Quantity</label>
                <input type="number" id="quantity" value="1" min="1" required>
            </div>
            
            <div class="input-group">
                <label for="price">Price</label>
                <input type="number" id="price" min="0" required>
            </div>
            
            <div class="input-group">
                <label for="remark">Remark</label>
                <textarea id="remark" rows="4"></textarea>
            </div>

            <div class="form-actions" style="margin-top: 20px;">
                <button type="button" id="cancel-btn" class="btn-secondary">Cancel</button>
                <button type="submit" class="btn-primary">Save Part</button>
            </div>
        </form>
    </main>

    <script>
        const { ipcRenderer } = require('electron');
        const form = document.getElementById('add-form');
        const cancelBtn = document.getElementById('cancel-btn');

        // Close the popup without saving
        cancelBtn.addEventListener('click', () => {
            window.close();
        });

        // Package the new data format and send it to main.js
        form.addEventListener('submit', (e) => {
            e.preventDefault();
            
            const newItem = {
                partNo: document.getElementById('part-no').value,
                partRefNo: document.getElementById('part-ref-no').value,
                description: document.getElementById('description').value,
                qty: document.getElementById('quantity').value,
                price: document.getElementById('price').value,
                remark: document.getElementById('remark').value
            };

            ipcRenderer.send('submit-new-item', newItem);
            window.close(); 
        });
    </script>
</body>
</html>
