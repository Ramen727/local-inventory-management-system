<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <title>Add Stock</title>
</head>
<body>
    <header class="modal-header">
        <h1>Add Stock</h1>
    </header>
    
    <main style="padding: 20px;">
        <div style="margin-bottom: 15px; padding: 10px; background-color: #f8f9fa; border-radius: 4px; border: 1px solid #e2e8f0;">
            <strong>Selected Part: </strong> <span id="display-part-name" style="color: #0891b2; font-weight: bold;">Loading...</span>
        </div>

        <form id="add-stock-form">
            <div class="input-group">
                <label for="quantity">Quantity to Add</label>
                <input type="number" id="quantity" value="1" min="1" required>
            </div>

            <div class="form-actions" style="margin-top: 20px;">
                <button type="button" id="cancel-btn" class="btn-secondary">Cancel</button>
                <button type="submit" class="btn-primary">Confirm Add</button>
            </div>
        </form>
    </main>

    <script>
        const { ipcRenderer } = require('electron');
        const form = document.getElementById('add-stock-form');
        const cancelBtn = document.getElementById('cancel-btn');
        const displayPartName = document.getElementById('display-part-name');

        // 1. Ask the Brain for the item data as soon as window opens
        ipcRenderer.send('request-item-data');

        // 2. Catch the reply and print the item description on screen
        ipcRenderer.on('receive-item-data', (event, partData) => {
            if(displayPartName) {
                displayPartName.innerText = partData.description || partData.partNo || "Unknown Part";
            }
        });

        // 3. Close without saving
        cancelBtn.addEventListener('click', () => {
            window.close();
        });

        // 4. Do the math and send it back to the Brain
        form.addEventListener('submit', (e) => {
            e.preventDefault();
            const addedAmount = parseInt(document.getElementById('quantity').value, 10);
            
            ipcRenderer.send('submit-addition', addedAmount); 
            window.close(); 
        });
    </script>
</body>
</html>
