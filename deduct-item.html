<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <title>Deduct Stock</title>
</head>
<body>
    <header class="modal-header">
        <h1>Deduct Stock</h1>
    </header>
    
    <main style="padding: 20px;">
        <div style="margin-bottom: 15px; padding: 10px; background-color: #fef2f2; border-radius: 4px; border: 1px solid #fca5a5;">
            <strong>Selected Part: </strong> <span id="display-part-name" style="color: #dc2626; font-weight: bold;">Loading...</span>
        </div>

        <form id="deduct-stock-form">
            <div class="input-group">
                <label for="quantity">Quantity to Deduct</label>
                <input type="number" id="quantity" value="1" min="1" required>
            </div>

            <div class="form-actions" style="margin-top: 20px;">
                <button type="button" id="cancel-btn" class="btn-secondary">Cancel</button>
                <button type="submit" class="btn-danger">Confirm Deduct</button>
            </div>
        </form>
    </main>

    <script>
        const { ipcRenderer } = require('electron');
        const form = document.getElementById('deduct-stock-form');
        const cancelBtn = document.getElementById('cancel-btn');
        const displayPartName = document.getElementById('display-part-name');
        
        // Grab the input box and label so we can talk to them
        const quantityInput = document.getElementById('quantity');
        const quantityLabel = document.querySelector('label[for="quantity"]');

        // 1. Ask the Brain for the item data as soon as window opens
        ipcRenderer.send('request-item-data');

        // 2. Catch the reply, print the name, AND set the maximum limit!
        ipcRenderer.on('receive-item-data', (event, partData) => {
            if(displayPartName) {
                displayPartName.innerText = partData.description || partData.partNo || "Unknown Part";
            }
            
            // NEW: Figure out exactly how many they own right now
            const currentStock = parseInt(partData.qty || 0, 10);
            
            // NEW: Lock the input box so it physically cannot submit a higher number
            quantityInput.max = currentStock;
            
            // NEW: Update the label so the technician knows how many are left
            if (quantityLabel) {
                quantityLabel.innerText = `Quantity to Deduct (Max: ${currentStock})`;
            }
        });

        // 3. Close without saving
        cancelBtn.addEventListener('click', () => {
            window.close();
        });

        // 4. Do the math and send it back to the Brain
        form.addEventListener('submit', (e) => {
            e.preventDefault();
            const deductAmount = parseInt(quantityInput.value, 10);
            
            ipcRenderer.send('submit-deduction', deductAmount); 
            window.close(); 
        });
    </script>
</body>
</html>
